services:
  # Default: all-in-one (docker compose up)
  magic-assistant:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    ports:
      - "8501:8501"

  # Split mode (docker compose --profile split up)
  magic-server:
    profiles: [split]
    image: ghcr.io/kienbui1995/magic:latest
    ports:
      - "8080:8080"
    environment:
      MAGIC_RATE_LIMIT_DISABLE: "true"

  spec-writer:
    profiles: [split]
    build: &worker-build
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN pip install magic-ai-sdk
        WORKDIR /app
        COPY workers/ ./workers/
    command: python workers/spec_writer.py
    environment:
      MAGIC_SERVER: http://magic-server:8080
    depends_on:
      - magic-server

  tech-design:
    profiles: [split]
    build: *worker-build
    command: python workers/tech_design.py
    environment:
      MAGIC_SERVER: http://magic-server:8080
    depends_on:
      - magic-server

  code-implement:
    profiles: [split]
    build: *worker-build
    command: python workers/code_implement.py
    environment:
      MAGIC_SERVER: http://magic-server:8080
    depends_on:
      - magic-server

  qa:
    profiles: [split]
    build: *worker-build
    command: python workers/qa.py
    environment:
      MAGIC_SERVER: http://magic-server:8080
    depends_on:
      - magic-server

  release-notes:
    profiles: [split]
    build: *worker-build
    command: python workers/release_notes.py
    environment:
      MAGIC_SERVER: http://magic-server:8080
    depends_on:
      - magic-server

  streamlit-ui:
    profiles: [split]
    build:
      context: .
    ports:
      - "8501:8501"
    environment:
      MAGIC_SERVER_URL: http://magic-server:8080
    depends_on:
      - magic-server
